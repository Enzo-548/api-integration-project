<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather UI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="app">
    <section class="weather">
      <!-- HEADER -->
      <header class="weather__header">
        <input id="txtInput" class="weather__location-input" value="Cidade, EF, BR" />
      </header>

      <!-- CURRENT -->
      <section class="weather__current" id="tempAtual">
        <img src="img/climate/day_clear.svg" alt="Clima ensolarado" />

        <div class="weather__current-info">
          <div class="weather__temperature">25°C</div>
          <p class="weather__description">Ensolarado</p>
        </div>
      </section>

      <!-- FORECAST -->
      <section class="weather__forecast">
        <div class="card card--forecast" id="slice_1">
          <span class="card__label">10:00</span>
          <img src="img/climate/day_clear.svg" class="card__icon" alt="ícone" />
          <span class="card__value">25°C</span>
        </div>

        <div class="card card--forecast" id="slice_2">
          <span class="card__label">13:00</span>
          <img src="img/climate/day_clear.svg" class="card__icon" alt="ícone" />
          <span class="card__value">26°C</span>
        </div>

        <div class="card card--forecast" id="slice_3">
          <span class="card__label">16:00</span>
          <img src="img/climate/day_clear.svg" class="card__icon" alt="ícone" />
          <span class="card__value">24°C</span>
        </div>

        <div class="card card--forecast" id="slice_4">
          <span class="card__label">19:00</span>
          <img src="img/climate/day_clear.svg" class="card__icon" alt="ícone" />
          <span class="card__value">22°C</span>
        </div>
      </section>

      <!-- STATS -->
      <section class="weather__stats">
        <div class="card card--stat">
          <div class="card__info">
            <span class="card__label">Vento</span>
            <span class="card__value" id="wind">14 km/h</span>
          </div>
          <img src="img/info/wind.svg" class="card__icon" alt="vento" />
        </div>

        <div class="card card--stat">
          <div class="card__info">
            <span class="card__label">Pressão</span>
            <span class="card__value" id="pressure">1015 hPa</span>
          </div>
          <img src="img/info/pressure.svg" class="card__icon" alt="pressão" />
        </div>

        <div class="card card--stat">
          <div class="card__info">
            <span class="card__label">Umidade</span>
            <span class="card__value" id="humidity">30%</span>
          </div>
          <img src="img/info/humidity.svg" class="card__icon" alt="umidade" />
        </div>

        <div class="card card--stat">
          <div class="card__info">
            <span class="card__label">Sensação</span>
            <span class="card__value" id="feels">20°C</span>
          </div>
          <img src="img/info/temperature.svg" class="card__icon" alt="sensação" />
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="js/script.js"></script>
</body>

</html>
